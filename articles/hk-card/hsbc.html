<h2>账户特点</h2>

<div class="warn">
  <p>需要保持日均 1 万港币，否则每月会收取 100 港币管理费。这 1 万港币可以用于购买股票或办理定期存款。</p>
</div>

<p>使用国内兴业银行「寰宇人生」借记卡电汇至汇丰，可以享受 0 手续费。</p>

<h2>常见问题：无法即时开立账户</h2>

<figure class="article-figure article-figure--hsbc-status">
  <img src="assets/images/hk-card/hsbc/hsbc-01.jpg" alt="汇丰无法即时开立账户提示页面">
  <figcaption>出现“无法即时为您开立账户”提示时的页面示例</figcaption>
</figure>

<p>出现该提示并不代表开户失败，而是汇丰需要几天时间处理申请。一般等待几天后即可收到成功开户的邮件。</p>
